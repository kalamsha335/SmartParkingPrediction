<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SmartPark — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#060d14;display:flex;align-items:center;justify-content:center;
     font-family:'Rajdhani',sans-serif;color:#c8dde8}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,212,255,.04)1px,transparent 1px),
  linear-gradient(90deg,rgba(0,212,255,.04)1px,transparent 1px);background-size:40px 40px}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.logo{font-family:'Orbitron',monospace;font-size:1.7rem;font-weight:900;color:#fff;
      text-align:center;letter-spacing:3px;margin-bottom:4px}
.logo span{color:#00d4ff}
.tagline{text-align:center;color:#4a6478;font-size:.88rem;margin-bottom:30px}
.card{background:#0b1825;border:1px solid #0e2a3f;border-radius:16px;padding:36px 32px;
      box-shadow:0 24px 64px rgba(0,0,0,.6)}
.tab-row{display:flex;border-bottom:1px solid #0e2a3f;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;text-align:center;cursor:pointer;border-radius:8px 8px 0 0;
     font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;color:#4a6478;transition:all .2s}
.tab.active{color:#00d4ff;border-bottom:2px solid #00d4ff}
.flash{padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:.88rem;font-weight:500}
.flash-danger{background:rgba(255,60,92,.08);border:1px solid rgba(255,60,92,.25);color:#ff3c5c}
.flash-success{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);color:#00ff88}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.74rem;color:#4a6478;font-weight:600;
                  letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.fc{width:100%;background:#060d14;border:1px solid #0e2a3f;border-radius:8px;padding:12px 14px;
    color:#fff;font-family:'Rajdhani',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.fc:focus{border-color:#00d4ff}
.fc::placeholder{color:#2a4a5a}
.btn{width:100%;padding:13px;border:none;border-radius:8px;cursor:pointer;transition:all .2s;
     font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;letter-spacing:1px;margin-top:6px}
.btn-login{background:linear-gradient(135deg,#005f7a,#00d4ff);color:#000}
.btn-reg  {background:linear-gradient(135deg,#006b3a,#00ff88);color:#000}
.btn:hover{opacity:.84;transform:translateY(-1px)}
.demo-box{margin-top:20px;background:#060d14;border:1px dashed #0e2a3f;border-radius:8px;
          padding:13px;font-size:.78rem;color:#4a6478;line-height:1.8}
.demo-box b{color:#ffd000}
.link{color:#00d4ff;cursor:pointer;font-weight:600;text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">SMART<span>PARK</span></div>
  <div class="tagline">CNN Powered Smart Parking System</div>
  <div class="card">
    <div class="tab-row">
      <div class="tab active" id="tab-login" onclick="showTab('login')">LOGIN</div>
      <div class="tab"        id="tab-reg"   onclick="showTab('reg')">REGISTER</div>
    </div>

    {% with msgs=get_flashed_messages(with_categories=true) %}
      {% for cat,msg in msgs %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <!-- LOGIN FORM -->
    <div id="pane-login">
      <form method="POST" action="/login">
        <div class="form-group"><label>Email</label>
          <input class="fc" type="email" name="email" placeholder="Enter your email" required/></div>
        <div class="form-group"><label>Password</label>
          <input class="fc" type="password" name="password" placeholder="Enter password" required/></div>
        <button class="btn btn-login" type="submit">LOGIN</button>
      </form>
    </div>

    <!-- REGISTER FORM -->
    <div id="pane-reg" style="display:none">
      <form method="POST" action="/register">
        <div class="form-group"><label>Full Name</label>
          <input class="fc" type="text" name="name" placeholder="Your full name" required/></div>
        <div class="form-group"><label>Phone Number</label>
          <input class="fc" type="tel" name="phone" placeholder="10-digit phone" required/></div>
        <div class="form-group"><label>Email</label>
          <input class="fc" type="email" name="email" placeholder="Your email" required/></div>
        <div class="form-group"><label>Password</label>
          <input class="fc" type="password" name="password" placeholder="Create password" required/></div>
        <button class="btn btn-reg" type="submit">CREATE ACCOUNT</button>
      </form>
    </div>

  </div>
</div>
<script>
function showTab(t){
  document.getElementById('pane-login').style.display = t==='login'?'block':'none';
  document.getElementById('pane-reg').style.display   = t==='reg'  ?'block':'none';
  document.getElementById('tab-login').className = 'tab'+(t==='login'?' active':'');
  document.getElementById('tab-reg').className   = 'tab'+(t==='reg'  ?' active':'');
}
// Auto-show register tab if redirected after register error
{% with msgs=get_flashed_messages() %}
  {% if msgs and request.referrer and 'register' in request.referrer %}
  showTab('reg');
  {% endif %}
{% endwith %}
</script>
</body>
</html>
